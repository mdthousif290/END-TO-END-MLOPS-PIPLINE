name: MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Kaggle and download dataset
        env:
          KAGGLE_TOKEN: ${{ secrets.KAGGLE_TOKEN }}
        run: |
          pip install kaggle
          mkdir -p data/raw
          kaggle datasets download -d blastchar/telco-customer-churn
          unzip telco-customer-churn.zip -d data/raw/
          mv "data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv" data/raw/data.csv

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Run data ingestion
        run: python src/ingest.py

      - name: Train model
        run: python src/train.py

      - name: Run drift validation
        run: python src/validate.py

      - name: Upload drift report
        uses: actions/upload-artifact@v3
        with:
          name: drift-report
          path: reports/drift.html